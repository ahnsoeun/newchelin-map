    const VOL_LABEL = Object.fromEntries(VOLS.map((v, i) => [v, (i + 1) + '편']));

    function makeIcon(color, active) {
      const s  = active ? 40 : 30;
      const h  = Math.round(s * 1.32);
      const sw = active ? 3 : 2.4;
      const svg = `<svg class="nc-pin" xmlns="http://www.w3.org/2000/svg" width="${s}" height="${h}" viewBox="0 0 36 47">
        <path d="M18 2C10 2 3.5 8.3 3.5 16.5c0 10 14.5 27.5 14.5 27.5s14.5-17.5 14.5-27.5C32.5 8.3 26 2 18 2z"
          fill="${active ? color : '#fff'}" stroke="${color}" stroke-width="${sw}"/>
        <circle cx="18" cy="16.5" r="5" fill="${active ? '#fff' : color}"/>
      </svg>`;
      return window.L.divIcon({ html: svg, className: '', iconSize: [s, h], iconAnchor: [s/2, h], popupAnchor: [0, -h] });
    }

    function makeCompanyIcon() {
      const s = 38, h = Math.round(s * 1.32);
      const svg = `<svg class="nc-pin" xmlns="http://www.w3.org/2000/svg" width="${s}" height="${h}" viewBox="0 0 36 47">
        <path d="M18 2C10 2 3.5 8.3 3.5 16.5c0 10 14.5 27.5 14.5 27.5s14.5-17.5 14.5-27.5C32.5 8.3 26 2 18 2z"
          fill="${COMPANY_COLOR}" stroke="#fff" stroke-width="2.4"/>
        <text x="18" y="21.5" font-size="14" font-weight="800" font-family="Pretendard, sans-serif" fill="#fff" text-anchor="middle">N</text>
      </svg>`;
      return window.L.divIcon({ html: svg, className: '', iconSize: [s, h], iconAnchor: [s/2, h], popupAnchor: [0, -h] });
    }

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    const IconSearch = () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>);

    function LineBar({ volFilter, setVolFilter, volCounts }) {

    function MapView({ places, selectedId, onSelectPlace, mapRef }) {
      const mapEl   = useRef(null);
      const mapObj  = useRef(null);
      const markers = useRef({});

      useEffect(() => {
        if (!mapEl.current || mapObj.current) return;
        const map = window.L.map(mapEl.current, {
          center: [MAP_CENTER.lat, MAP_CENTER.lng], zoom: MAP_ZOOM, zoomControl: false,
        });
        window.L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png', {
          attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> · © <a href="https://carto.com/attributions">CARTO</a>',
          maxZoom: 20, subdomains: 'abcd',
        }).addTo(map);
        window.L.control.zoom({ position: 'bottomright' }).addTo(map);

        window.L.marker([COMPANY.lat, COMPANY.lng], {
          icon: makeCompanyIcon(), title: COMPANY.name, zIndexOffset: 500,
        }).addTo(map).bindPopup(
          `<div style="font-family:'Pretendard',sans-serif;min-width:150px;">` +
            `<div style="font-size:10.5px;font-weight:700;color:${COMPANY_COLOR};">NEW ID · 본사</div>` +
            `<div style="font-size:14px;font-weight:800;color:#191F28;margin-top:2px;">${esc(COMPANY.name)}</div>` +
            `<div style="font-size:11px;color:#8B95A1;margin-top:3px;">${esc(COMPANY.address)}</div>` +
          `</div>`, { maxWidth: 230 });

        mapObj.current = map;
        if (mapRef) mapRef.current = map;
        setTimeout(() => map.invalidateSize(), 200);
        return () => { map.remove(); mapObj.current = null; markers.current = {}; };
      }, []);

      useEffect(() => {
        const map = mapObj.current;
        if (!map) return;
        const ro = new ResizeObserver(() => map.invalidateSize());
        if (mapEl.current) ro.observe(mapEl.current);
        return () => ro.disconnect();
      }, []);

      useEffect(() => {
        const map = mapObj.current;
        if (!map) return;
        const keep = new Set(places.map(p => p.id));
        Object.keys(markers.current).forEach(id => {
          if (!keep.has(id)) { markers.current[id].remove(); delete markers.current[id]; }
        });
        places.forEach(p => {
          const color  = getColor(p);
          const active = p.id === selectedId;
          if (markers.current[p.id]) {
            markers.current[p.id].setIcon(makeIcon(color, active));
            markers.current[p.id].setZIndexOffset(active ? 1000 : 0);
            return;
          }
          const marker = window.L.marker([p.lat, p.lng], { icon: makeIcon(color, false), title: p.name }).addTo(map);
          const menus = (p.recommendedMenu || [])
            .map(m => `<span style="display:inline-block;background:#F2F4F6;color:#4E5968;border-radius:7px;padding:2px 8px;font-size:11px;font-weight:600;margin:3px 4px 0 0;">${esc(m)}</span>`)
            .join('');
          const naver = p.naverUrl
            ? `<a href="${esc(p.naverUrl)}" target="_blank" rel="noopener noreferrer" style="display:inline-block;margin-top:10px;background:#03C75A;color:#fff;text-decoration:none;border-radius:8px;padding:6px 12px;font-size:11.5px;font-weight:700;">네이버 지도 →</a>`
            : '';
          const popup =
            `<div style="font-family:'Pretendard',sans-serif;min-width:180px;max-width:230px;">` +
              `<div style="font-size:11px;font-weight:700;color:${color};">${VOL_LABEL[p.vol]} · ${CATEGORY_META[p.category].label}</div>` +
              `<div style="font-size:15.5px;font-weight:800;color:#191F28;margin-top:2px;letter-spacing:-0.02em;">${esc(p.name)}</div>` +
              `<div style="font-size:12px;color:#4E5968;margin-top:3px;line-height:1.5;">${esc(p.oneLiner)}</div>` +
              (menus ? `<div style="margin-top:6px;">${menus}</div>` : '') +
              (p.hours ? `<div style="font-size:10.5px;color:#8B95A1;margin-top:8px;">🕒 ${esc(p.hours)}</div>` : '') +
              naver +
            `</div>`;
          marker.bindPopup(popup, {
            maxWidth: 250,
            autoPan: true,
            autoPanPaddingTopLeft: window.L.point(16, 96),
            autoPanPaddingBottomRight: window.L.point(16, 24),
          });
          marker.on('click', () => onSelectPlace(p.id, 'marker'));
          markers.current[p.id] = marker;
        });
      }, [places, selectedId]);

      useEffect(() => {
        const map = mapObj.current;
        if (!map || !selectedId) return;
        const p = places.find(x => x.id === selectedId);
        const marker = markers.current[selectedId];
        if (!p || !marker) return;
        const zoom = Math.max(map.getZoom(), 16);
        // 마커를 화면 정중앙이 아니라 아래쪽에 두어, 위로 펼쳐지는 말풍선이 잘리지 않게 함.
        // 작은 화면일수록 오프셋이 커야 하므로 지도 높이에 비례(최대 150px).
        const offsetY = Math.min(map.getSize().y * 0.28, 150);
        const target  = map.project([p.lat, p.lng], zoom).subtract([0, offsetY]);
        map.setView(map.unproject(target, zoom), zoom, { animate: true });
        setTimeout(() => marker.openPopup(), 350);
      }, [selectedId]);

      return <div ref={mapEl} style={{ width: '100%', height: '100%' }} />;
    }

    function App() {
      const [cat, setCat]         = useState('all');
      const [volFilter, setVol]   = useState('all');
      const [query, setQuery]     = useState('');
      const [selectedId, setSel]  = useState(null);
      const cardRefs = useRef({});
      const mapRef   = useRef(null);

      const q = query.trim().toLowerCase();
      const filtered = useMemo(() => {
        let list = PLACES.filter(p =>
          (cat === 'all' || p.category === cat) &&
          (volFilter === 'all' || p.vol === volFilter)
        );
        if (q) {
          list = list.filter(p =>
            (p.name + ' ' + p.oneLiner + ' ' + (p.recommendedMenu||[]).join(' ') + ' ' + (p.address||'')).toLowerCase().includes(q)
          );
        }
        return [...list].sort((a,b) => b.issue - a.issue);
      }, [cat, volFilter, q]);

      const counts = useMemo(() => {
        const base = PLACES.filter(p => volFilter === 'all' || p.vol === volFilter);
        return {
          all: base.length,
          restaurant: base.filter(p => p.category === 'restaurant').length,
          cafe: base.filter(p => p.category === 'cafe').length,
        };
      }, [volFilter]);

      const volCounts = useMemo(() => {
        const base = PLACES.filter(p => cat === 'all' || p.category === cat);
        const o = { all: base.length };
        VOLS.forEach(v => { o[v] = base.filter(p => p.vol === v).length; });
        return o;
      }, [cat]);

      useEffect(() => {
        if (selectedId && !filtered.some(p => p.id === selectedId)) setSel(null);
      }, [filtered, selectedId]);

      const handleSelect = useCallback((id, source) => {
        setSel(id);
        if (source === 'marker') {
          requestAnimationFrame(() => {
            cardRefs.current[id]?.scrollIntoView({ behavior: 'smooth', block: 'center' });
          });
        }
      }, []);

      // 두 필터(카테고리 × Vol)가 충돌해 결과가 0이 되면, 방금 안 누른 쪽을 '전체'로 풀어 빈 화면을 막는다.
      const chooseVol = useCallback((v) => {
        setVol(v);
        if (v !== 'all' && !PLACES.some(p => p.vol === v && (cat === 'all' || p.category === cat))) setCat('all');
      }, [cat]);
      const chooseCat = useCallback((c) => {
        setCat(c);
        if (c !== 'all' && !PLACES.some(p => p.category === c && (volFilter === 'all' || p.vol === volFilter))) setVol('all');
      }, [volFilter]);

      const reset = useCallback(() => {
        setCat('all'); setVol('all'); setQuery(''); setSel(null);
        if (mapRef.current) mapRef.current.setView([MAP_CENTER.lat, MAP_CENTER.lng], MAP_ZOOM, { animate: true });
      }, []);

      return (
        <div className="app">
          {/* ── left rail (desktop) ── */}
          <aside className="rail">
            <img className="rail__logo" src="assets/orange_icon.png" alt="뉴슐랭" />
            <button className="rail__btn" title="지도 원위치 · 필터 초기화" onClick={reset}><IconPinFill /></button>
            <a className="rail__btn" title="뉴스레터 구독" href="https://page.stibee.com/subscriptions/437650" target="_blank" rel="noopener noreferrer"><IconMailFill /></a>
            <div className="rail__spacer" />
            <a className="rail__btn" title="NEW ID 홈페이지" href="https://www.its-newid.com/" target="_blank" rel="noopener noreferrer"><IconHomeFill /></a>
          </aside>

          {/* ── map stage + line bar ── */}
          <div className="stage">
            <div className="map-layer">
              <MapView places={filtered} selectedId={selectedId} onSelectPlace={handleSelect} mapRef={mapRef} />
            </div>
            <LineBar volFilter={volFilter} setVolFilter={chooseVol} volCounts={volCounts} />
          </div>

          {/* ── floating panel ── */}
          <section className="panel">
            <div className="head">
              <img className="head__logo" src="assets/orange_icon.png" alt="" />
              <div>
                <div className="head__name">뉴슐랭 가이드</div>
                <div className="head__tag">강남 맛집·카페 지도 · by NEW ID</div>
              </div>
            </div>

            <div className="body nc-scroll">
              <Banner />
              <SearchBar query={query} setQuery={setQuery} />
              <Chips cat={cat} setCat={chooseCat} counts={counts} />
              <p className="count-line">
                {volFilter === 'all' ? '전체' : VOL_LABEL[volFilter]} · <b>{filtered.length}곳</b>
                {q && <span> · “{query}” 검색</span>}
              </p>
              <List places={filtered} selectedId={selectedId} onSelectPlace={handleSelect}
                cardRefs={cardRefs} hasQuery={!!q} onReset={reset} />
            </div>

            <Footer />
          </section>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    function revealRoot() { document.getElementById('root').classList.add('nc-ready'); }
    Promise.race([
      (document.fonts ? document.fonts.ready : Promise.resolve()),
      new Promise(resolve => setTimeout(resolve, 800)),
    ]).then(revealRoot);
  </script>
</body>
</html>
