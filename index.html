        recommendedMenu: ['낙지비빔밥', '꼬막비빔밥', '사랑채정식'],
        address: '서울 강남구 언주로133길 31',
        hours: '월~토 11:00~21:30 (브레이크타임 15:00~17:00) / 일 휴무',
        phone: '0507-1364-2287',
        lat: 37.5157974, lng: 127.0326633, naverUrl: 'https://naver.me/GQ1lswLT',
      },
    ];

    function makeIcon(color, active) {
      const s  = active ? 44 : 34;
      const h  = Math.round(s * 1.3);
      const sw = active ? 3 : 2;
      const stroke = active ? '#1a1a1a' : '#fff';
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${h}" viewBox="0 0 36 47">
        <path d="M18 1C9 1 2 8 2 17c0 11 16 29 16 29s16-18 16-29C34 8 27 1 18 1z"
          fill="${color}" stroke="${stroke}" stroke-width="${sw}"/>
        <circle cx="18" cy="17" r="6" fill="#fff"/>
      </svg>`;
      return window.L.divIcon({
        html: svg, className: '',
        iconSize: [s, h], iconAnchor: [s / 2, h], popupAnchor: [0, -h],
      });
    }

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function FilterTab({ active, onClick, children }) {
      return (
        <button type="button" onClick={onClick}
          className={
            'flex-1 py-1.5 px-2 rounded-full text-[12px] font-medium transition-colors border ' +
            (active
              ? 'bg-[#FF6B35] text-white border-[#FF6B35]'
              : 'bg-white text-gray-500 border-gray-200 hover:bg-orange-50')
          }
        >{children}</button>
      );
    }

    function Pill({ color, children }) {
      return (
        <span className="inline-block px-2 py-0.5 rounded-full text-[11px] font-medium leading-tight"
          style={{ background: color + '20', color }}>
          {children}
        </span>
      );
    }

    function PlaceCard({ place, selected, onClick, cardRef }) {
      const meta  = CATEGORY_META[place.category];
      const color = getColor(place);
      return (
        <div ref={cardRef} role="button" tabIndex={0} onClick={onClick}
          onKeyDown={e => { if (e.key==='Enter'||e.key===' ') { e.preventDefault(); onClick(); } }}
          className={
            'cursor-pointer rounded-xl border-2 bg-white p-4 transition-all outline-none ' +
            (selected
              ? 'border-[#FF6B35] bg-[#FFF4F0] nc-selected'
              : 'border-gray-100 hover:bg-[#FFF4F0] hover:shadow-sm')
          }
        >
          <div className="flex items-center gap-1.5 mb-1.5">
            <span className="px-2 py-0.5 rounded-md text-[11px] font-bold"
              style={{ background: color + '20', color }}>{place.vol}</span>
            <span className="text-[11px] text-gray-400">{meta.emoji} {meta.label}</span>
            <span className="text-[11px] text-gray-300">#{place.issue}호</span>
          </div>

          <h3 className="font-bold text-[15px] text-gray-900 leading-snug">{place.name}</h3>
          <p className="text-[12px] text-gray-500 mt-0.5 leading-snug">{place.oneLiner}</p>

          {place.recommendedMenu?.length > 0 && (
            <div className="flex flex-wrap gap-1 mt-2.5">
              {place.recommendedMenu.map((m, i) => <Pill key={i} color={color}>{m}</Pill>)}
            </div>
          )}

          {place.address && (
            <p className="text-[11px] text-gray-400 mt-2 flex items-start gap-1">
              <span>📍</span><span>{place.address}</span>
            </p>
          )}
          {place.hours && (
            <p className="text-[11px] text-gray-400 mt-0.5 flex items-start gap-1">
              <span>🕒</span><span>{place.hours}</span>
            </p>
          )}

          {place.naverUrl && (
            <a href={place.naverUrl} target="_blank" rel="noopener noreferrer"
              onClick={e => e.stopPropagation()}
              className="inline-flex items-center gap-1 mt-3 px-3 py-1.5 rounded-lg text-white text-[11px] font-bold hover:opacity-90 transition-opacity"
              style={{ background: '#03C75A' }}>
              네이버 지도 →
            </a>
          )}
        </div>
      );
    }

    function MapView({ places, selectedId, onSelectPlace }) {
      const mapEl   = useRef(null);
      const mapObj  = useRef(null);
      const markers = useRef({});

      useEffect(() => {
        if (!mapEl.current || mapObj.current) return;
        const map = window.L.map(mapEl.current, {
          center: [MAP_CENTER.lat, MAP_CENTER.lng],
          zoom: MAP_ZOOM,
        });
        window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
          maxZoom: 19,
        }).addTo(map);
        mapObj.current = map;
        setTimeout(() => map.invalidateSize(), 200);
        return () => { map.remove(); mapObj.current = null; markers.current = {}; };
      }, []);

      useEffect(() => {
        const map = mapObj.current;
        if (!map) return;
        const ro = new ResizeObserver(() => map.invalidateSize());
        if (mapEl.current) ro.observe(mapEl.current);
        return () => ro.disconnect();
      }, []);

      useEffect(() => {
        const map = mapObj.current;
        if (!map) return;
        const keep = new Set(places.map(p => p.id));
        Object.keys(markers.current).forEach(id => {
          if (!keep.has(id)) { markers.current[id].remove(); delete markers.current[id]; }
        });
        places.forEach(p => {
          const color  = getColor(p);
          const active = p.id === selectedId;
          if (markers.current[p.id]) {
            markers.current[p.id].setIcon(makeIcon(color, active));
            markers.current[p.id].setZIndexOffset(active ? 1000 : 0);
            return;
          }
          const marker = window.L.marker([p.lat, p.lng], {
            icon: makeIcon(color, false), title: p.name,
          }).addTo(map);
          const menus = (p.recommendedMenu || [])
            .map(m => `<span style="display:inline-block;background:${color}22;color:${color};border-radius:9999px;padding:1px 8px;font-size:11px;margin:2px 3px 0 0;">${esc(m)}</span>`)
            .join('');
          const naver = p.naverUrl
            ? `<a href="${esc(p.naverUrl)}" target="_blank" rel="noopener noreferrer" style="display:inline-block;margin-top:8px;background:#03C75A;color:#fff;text-decoration:none;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;">네이버 지도 →</a>`
            : '';
          const popup =
            `<div style="font-family:'Noto Sans KR',sans-serif;min-width:170px;max-width:220px;">` +
              `<div style="font-size:10px;font-weight:700;color:${color};margin-bottom:2px;">${esc(p.vol)} · ${CATEGORY_META[p.category].emoji} ${CATEGORY_META[p.category].label}</div>` +
              `<div style="font-size:14px;font-weight:700;color:#1a1a1a;">${esc(p.name)}</div>` +
              `<div style="font-size:11px;color:#666;margin-top:2px;">${esc(p.oneLiner)}</div>` +
              (menus ? `<div style="margin-top:6px;">${menus}</div>` : '') +
              (p.hours ? `<div style="font-size:10px;color:#999;margin-top:6px;">🕒 ${esc(p.hours)}</div>` : '') +
              naver +
            `</div>`;
          marker.bindPopup(popup, { maxWidth: 240 });
          marker.on('click', () => onSelectPlace(p.id, 'marker'));
          markers.current[p.id] = marker;
        });
      }, [places, selectedId]);

      useEffect(() => {
        const map = mapObj.current;
        if (!map || !selectedId) return;
        const p      = places.find(x => x.id === selectedId);
        const marker = markers.current[selectedId];
        if (!p || !marker) return;
        map.setView([p.lat, p.lng], Math.max(map.getZoom(), 16), { animate: true });
        setTimeout(() => marker.openPopup(), 350);
      }, [selectedId]);

      return <div ref={mapEl} style={{ width: '100%', height: '100%' }} />;
    }

    function Sidebar({ places, filter, setFilter, selectedId, onSelectPlace, cardRefs }) {

      return (
        <aside className="flex flex-col h-full bg-[#FAFAFA] border-r border-gray-200">

          {/* 헤더 — 오렌지 배너 (모바일에서 숨김) */}
          <header className="flex-shrink-0 border-b border-gray-200">
            <div className="hidden md:flex px-5 pt-4 pb-5 flex-col items-center text-center"
              style={{ background: '#FF6B35' }}>
              <img
                src="소스/white_icon.png"
                alt="뉴슐랭 아이콘"
                style={{ width: 32, height: 32, marginBottom: 8, filter: 'brightness(0) invert(1)' }}
              />
              <h1 style={{
                fontFamily: "'Poppins', sans-serif",
                fontWeight: 400, letterSpacing: '0.08em',

              }}>
                THE NEWCHELIN GUIDE
              </h1>
              <p style={{ color: 'rgba(255,255,255,0.82)', fontSize: 12, marginTop: 5 }}>
                뉴 아이디가 제안하는, 믿을 수 있는 미식 큐레이션
              </p>
            </div>

            {/* 모바일 전용 미니 헤더 */}
            <div className="flex md:hidden items-center gap-2 px-3 py-2" style={{ background: '#FF6B35' }}>
              <img src="소스/white_icon.png" alt="뉴슐랭 아이콘"
                style={{ width: 20, height: 20, filter: 'brightness(0) invert(1)' }} />
              <span style={{ fontFamily: "'Poppins', sans-serif", color: '#fff', fontSize: 14, fontWeight: 400, letterSpacing: '0.06em' }}>
                THE NEWCHELIN GUIDE
              </span>
            </div>

            {/* 필터 */}
            <div className="flex gap-1.5 px-3 py-2.5 bg-white">
              <FilterTab active={filter==='all'}        onClick={() => setFilter('all')}>전체 {counts.all}</FilterTab>
              <FilterTab active={filter==='restaurant'} onClick={() => setFilter('restaurant')}>🍚 맛집 {counts.restaurant}</FilterTab>
              <FilterTab active={filter==='cafe'}       onClick={() => setFilter('cafe')}>☕ 카페 {counts.cafe}</FilterTab>
            </div>
          </header>

          {/* 카드 리스트 */}
          <div className="flex-1 overflow-y-auto nc-scroll px-3 py-3 space-y-3">
            {places.length === 0 ? (
              <div className="text-center text-gray-400 text-sm py-12">해당 카테고리의 장소가 없습니다.</div>
            ) : (
              places.map(p => (
                <PlaceCard
                  key={p.id} place={p}
                  selected={p.id === selectedId}
                  onClick={() => onSelectPlace(p.id, 'card')}
                  cardRef={el => { cardRefs.current[p.id] = el; }}
                />
              ))
            )}
          </div>

          <footer className="flex-shrink-0 px-4 py-2 border-t border-gray-100 bg-white text-center">
            <p className="text-[10px] text-gray-400">
              © NEW ID Co., Ltd. —{' '}
              <a href="https://page.stibee.com/subscriptions/437650" target="_blank" rel="noopener noreferrer"
                className="underline hover:text-orange-400">뉴스레터 구독</a>
            </p>
          </footer>
        </aside>
      );
    }

    function App() {
      const [filter, setFilter]         = useState('all');
      const [selectedId, setSelectedId] = useState(null);
      const cardRefs = useRef({});

      const filtered = useMemo(() => {
        const list = filter === 'all' ? PLACES : PLACES.filter(p => p.category === filter);
        return [...list].sort((a, b) => b.issue - a.issue);
      }, [filter]);

      const counts = useMemo(() => ({
        all:        PLACES.length,
        restaurant: PLACES.filter(p => p.category === 'restaurant').length,
        cafe:       PLACES.filter(p => p.category === 'cafe').length,
      }), []);

      useEffect(() => {
        if (selectedId && !filtered.some(p => p.id === selectedId)) setSelectedId(null);
      }, [filtered, selectedId]);

      const handleSelect = useCallback((id, source) => {
        setSelectedId(id);
        if (source === 'marker') {
          requestAnimationFrame(() => {
            cardRefs.current[id]?.scrollIntoView({ behavior: 'smooth', block: 'center' });
          });
        }
      }, []);

      return (
        <div className="app-root">

          {/* ── 모바일 전용 상단 헤더 (데스크톱 숨김) ── */}
          <div className="md:hidden flex-shrink-0">
            <div className="flex items-center gap-2 px-3 py-2" style={{ background: '#FF6B35' }}>
              <img src="소스/white_icon.png" alt="뉴슐랭 아이콘"
                style={{ width: 20, height: 20, filter: 'brightness(0) invert(1)' }} />
              <span style={{ fontFamily: "'Poppins', sans-serif", color: '#fff', fontSize: 14, letterSpacing: '0.06em' }}>
                THE NEWCHELIN GUIDE
              </span>
            </div>
            <div className="flex gap-1.5 px-3 py-2 bg-white border-b border-gray-200">
              <FilterTab active={filter==='all'}        onClick={() => setFilter('all')}>전체 {counts.all}</FilterTab>
              <FilterTab active={filter==='restaurant'} onClick={() => setFilter('restaurant')}>🍚 맛집 {counts.restaurant}</FilterTab>
              <FilterTab active={filter==='cafe'}       onClick={() => setFilter('cafe')}>☕ 카페 {counts.cafe}</FilterTab>
            </div>
          </div>

          {/* ── 지도 (항상 렌더링, 모바일 40vh / 데스크톱 flex-1 full height) ── */}
          <div className="map-wrap">
            <MapView places={filtered} selectedId={selectedId} onSelectPlace={handleSelect} />
          </div>

          {/* ── 모바일: 카드 리스트 (데스크톱 숨김) ── */}
          <div className="md:hidden flex-1 min-h-0 overflow-y-auto nc-scroll bg-[#FAFAFA] px-3 py-3 space-y-3">
            {filtered.length === 0 ? (
              <div className="text-center text-gray-400 text-sm py-12">해당 카테고리의 장소가 없습니다.</div>
            ) : (
              filtered.map(p => (
                <PlaceCard key={p.id} place={p}
                  selected={p.id === selectedId}
                  onClick={() => handleSelect(p.id, 'card')}
                  cardRef={el => { cardRefs.current[p.id] = el; }}
                />
              ))
            )}
          </div>

          {/* ── 모바일: 풋터 (데스크톱 숨김) ── */}
          <footer className="md:hidden flex-shrink-0 px-4 py-2 border-t border-gray-100 bg-white text-center">
            <p className="text-[10px] text-gray-400">
              © NEW ID Co., Ltd. —{' '}
              <a href="https://page.stibee.com/subscriptions/437650" target="_blank" rel="noopener noreferrer"
                className="underline hover:text-orange-400">뉴스레터 구독</a>
            </p>
          </footer>

          {/* ── 데스크톱: 왼쪽 사이드패널 (모바일 숨김) ── */}
          <div className="sidebar-wrap hidden md:flex flex-col">
            <Sidebar
              places={filtered} filter={filter} setFilter={setFilter}
              selectedId={selectedId} onSelectPlace={handleSelect} cardRefs={cardRefs}
            />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
